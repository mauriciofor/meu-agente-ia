<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Assistente IA - BB-8</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #0a2a1a 0%, #0a1a0a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
            position: relative;
        }

        /* Estrelas de fundo */
        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0.6;
            animation: twinkle 3s infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.2; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(1.2); }
        }

        /* Container principal */
        .chat-container {
            width: 100%;
            max-width: 500px;
            height: 85vh;
            background: rgba(0,0,0,0.85);
            border-radius: 40px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            backdrop-filter: blur(10px);
            box-shadow: 0 0 50px rgba(100,255,150,0.2);
            position: relative;
            z-index: 1;
        }

        /* Header */
        .header {
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(100,255,150,0.3);
        }

        .badge {
            background: rgba(100,255,150,0.1);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            color: #7cff9e;
            font-weight: bold;
        }

        .online {
            width: 8px;
            height: 8px;
            background: #7cff9e;
            border-radius: 50%;
            display: inline-block;
            margin-right: 6px;
            animation: pulseGreen 1.5s infinite;
        }

        @keyframes pulseGreen {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        /* Área do robô */
        .robot-area {
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 240px;
        }

        .robot-video {
            width: 200px;
            height: 200px;
            object-fit: contain;
            filter: drop-shadow(0 0 20px rgba(100,255,150,0.6));
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
        }

        /* Área de mensagens */
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message {
            display: flex;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .user-message {
            justify-content: flex-end;
        }

        .bot-message {
            justify-content: flex-start;
        }

        .bubble {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 20px;
            font-size: 14px;
            line-height: 1.4;
        }

        .user-message .bubble {
            background: linear-gradient(135deg, #1a4730, #0a2a1a);
            color: #b8ffd0;
            border-bottom-right-radius: 4px;
        }

        .bot-message .bubble {
            background: rgba(30,40,30,0.95);
            color: #b8ffd0;
            border-bottom-left-radius: 4px;
            border-left: 3px solid #7cff9e;
        }

        .timestamp {
            font-size: 10px;
            color: #4a7a5a;
            margin-top: 5px;
        }

        /* Indicador de digitação */
        .typing-dots {
            display: inline-flex;
            gap: 4px;
            padding: 8px 0;
        }

        .typing-dots span {
            width: 8px;
            height: 8px;
            background: #7cff9e;
            border-radius: 50%;
            animation: typingAnim 1.4s infinite;
        }

        .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
        .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typingAnim {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.5; }
            30% { transform: translateY(-8px); opacity: 1; }
        }

        /* Input area */
        .input-area {
            padding: 15px;
            background: rgba(0,0,0,0.3);
            border-top: 1px solid rgba(100,255,150,0.2);
            display: flex;
            gap: 10px;
        }

        .input-field {
            flex: 1;
            background: rgba(20,30,20,0.95);
            border: 1px solid rgba(100,255,150,0.3);
            border-radius: 30px;
            padding: 12px 18px;
            color: #b8ffd0;
            font-size: 14px;
            outline: none;
        }

        .input-field::placeholder {
            color: #4a7a5a;
        }

        .input-field:focus {
            border-color: #7cff9e;
        }

        .send-button {
            background: #2a5a3a;
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.2s;
            color: #b8ffd0;
        }

        .send-button:hover {
            transform: scale(1.05);
            background: #3a7a4a;
        }

        /* Scrollbar */
        .messages-area::-webkit-scrollbar {
            width: 4px;
        }

        .messages-area::-webkit-scrollbar-track {
            background: #1a2a1a;
        }

        .messages-area::-webkit-scrollbar-thumb {
            background: #7cff9e;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <!-- Estrelas serão criadas pelo JavaScript -->
    <div id="stars"></div>

    <div class="chat-container">
        <div class="header">
            <div class="badge">
                <span class="online"></span> ONLINE
            </div>
            <div class="badge">⚡ IA ASSISTANT</div>
        </div>

        <div class="robot-area">
            <video class="robot-video" id="robotVideo" autoplay loop muted playsinline>
                <source src="bb8-sem-fundo.webm" type="video/webm">
                <source src="star-wars-bb8.mp4" type="video/mp4">
                Seu navegador não suporta vídeo.
            </video>
        </div>

        <div class="messages-area" id="messagesArea">
            <div class="message bot-message">
                <div class="bubble">
                    🤖 Olá! Eu sou o assistente IA.<br>
                    Como posso ajudar você hoje?
                    <div class="timestamp">Agora</div>
                </div>
            </div>
        </div>

        <div class="input-area">
            <input type="text" class="input-field" id="userInput" placeholder="Digite sua mensagem..." onkeypress="handleKeyPress(event)">
            <button class="send-button" onclick="sendMessage()">➤</button>
        </div>
    </div>

    <script>
        // Criar estrelas de fundo
        function createStars() {
            const starsContainer = document.getElementById('stars');
            for (let i = 0; i < 150; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.width = Math.random() * 3 + 'px';
                star.style.height = star.style.width;
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.animationDelay = Math.random() * 3 + 's';
                star.style.animationDuration = (Math.random() * 2 + 1) + 's';
                starsContainer.appendChild(star);
            }
        }
        createStars();

        let isProcessing = false;

        function addMessage(text, isUser) {
            const messagesArea = document.getElementById('messagesArea');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isUser ? 'user-message' : 'bot-message'}`;
            
            const time = new Date().toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
            
            messageDiv.innerHTML = `
                <div class="bubble">
                    ${text}
                    <div class="timestamp">${time}</div>
                </div>
            `;
            
            messagesArea.appendChild(messageDiv);
            messagesArea.scrollTop = messagesArea.scrollHeight;
        }

        function showTyping() {
            const messagesArea = document.getElementById('messagesArea');
            const typingDiv = document.createElement('div');
            typingDiv.className = 'message bot-message';
            typingDiv.id = 'typingIndicator';
            typingDiv.innerHTML = `
                <div class="bubble">
                    <div class="typing-dots">
                        <span></span><span></span><span></span>
                    </div>
                </div>
            `;
            messagesArea.appendChild(typingDiv);
            messagesArea.scrollTop = messagesArea.scrollHeight;
        }

        function hideTyping() {
            const typingDiv = document.getElementById('typingIndicator');
            if (typingDiv) typingDiv.remove();
        }

        async function sendMessage() {
            if (isProcessing) return;
            
            const input = document.getElementById('userInput');
            const message = input.value.trim();
            
            if (!message) return;
            
            addMessage(message, true);
            input.value = '';
            isProcessing = true;
            
            showTyping();
            
            try {
                const response = await fetch('http://localhost:5000/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: message })
                });
                
                const data = await response.json();
                
                hideTyping();
                addMessage(data.response, false);
                
            } catch (error) {
                console.error('Erro:', error);
                hideTyping();
                addMessage('❌ Erro de conexão com o servidor. Verifique se o servidor está rodando.', false);
            }
            
            isProcessing = false;
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }
    </script>
</body>
</html>
